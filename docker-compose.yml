services:
  vpn-checker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-checker
    ports:
      - "8000:8000"
    volumes:
      - vpn_data:/app/data
    restart: unless-stopped
    environment:
      - SINGBOX_PATH=/usr/local/bin/sing-box
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  vpn_data:
